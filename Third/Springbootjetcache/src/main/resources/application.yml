server:
  port: 9090

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tlais
    username: root
    password: 123456

jetcache:
  statIntervalMinutes: 1
  areaInCacheName: false
  remote:
    default:
      keyConvertor: fastjson
      valueEncode: java
      valueDecode: java
      type: redis.lettuce
      uri: redis://localhost:6379   # ✅ 字段名是 uri，不是 url
      poolConfig:
        maxTotal: 50
  local:
    default:
      type: linkedhashmap
      keyConvertor: fastjson

